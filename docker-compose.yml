# Production-ready local infrastructure for the Olist Data Engineering Platform.
# Kafka runs in KRaft mode, so ZooKeeper is intentionally not part of this stack.

services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: olist-kafka
    restart: unless-stopped
    env_file:
      - ./configs/.env
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    environment:
      CLUSTER_ID: "${KAFKA_KRAFT_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}"
      KAFKA_NODE_ID: "${KAFKA_NODE_ID:-1}"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "${KAFKA_NODE_ID:-1}@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092,INTERNAL://kafka:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "${KAFKA_AUTO_CREATE_TOPICS_ENABLE:-true}"
      KAFKA_NUM_PARTITIONS: "${KAFKA_NUM_PARTITIONS:-3}"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "${KAFKA_DEFAULT_REPLICATION_FACTOR:-1}"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:-1}"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "${KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR:-1}"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "${KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:-1}"
      KAFKA_LOG_RETENTION_HOURS: "${KAFKA_LOG_RETENTION_HOURS:-168}"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "${KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS:-0}"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c '</dev/tcp/localhost/9092'",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - olist-platform

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: olist-kafka-ui
    restart: unless-stopped
    env_file:
      - ./configs/.env
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "${KAFKA_UI_CLUSTER_NAME:-olist-kraft}"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:29092"
      DYNAMIC_CONFIG_ENABLED: "${KAFKA_UI_DYNAMIC_CONFIG_ENABLED:-false}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider --quiet http://localhost:8080/actuator/health || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - olist-platform

  postgres:
    image: postgres:16.3-alpine
    container_name: olist-postgres
    restart: unless-stopped
    env_file:
      - ./configs/.env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-olist}"
      POSTGRES_USER: "${POSTGRES_USER:-olist}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-olist}"
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-olist} -d $${POSTGRES_DB:-olist}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - olist-platform

  pgadmin:
    image: dpage/pgadmin4:8.9
    container_name: olist-pgadmin
    restart: unless-stopped
    env_file:
      - ./configs/.env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_DEFAULT_EMAIL:-admin@example.com}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_DEFAULT_PASSWORD:-admin}"
      PGADMIN_CONFIG_SERVER_MODE: "${PGADMIN_CONFIG_SERVER_MODE:-False}"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "${PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED:-False}"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider --quiet http://localhost/misc/ping || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - olist-platform

networks:
  olist-platform:
    name: olist-platform
    driver: bridge

volumes:
  kafka_data:
    name: olist-kafka-data
  postgres_data:
    name: olist-postgres-data
  pgadmin_data:
    name: olist-pgadmin-data
